<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قاعدة بيانات دفتر الديون</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #1e3c72;
            font-size: 32px;
            margin-bottom: 10px;
        }
        h1 i {
            color: #FFD700;
        }
        p {
            color: #555;
            font-size: 16px;
            line-height: 1.8;
        }
        .code {
            background: #f0f2f5;
            padding: 10px 15px;
            border-radius: 10px;
            font-family: monospace;
            color: #1e3c72;
            display: inline-block;
            margin: 10px 0;
        }
        .badge {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
        }
        hr {
            border: none;
            border-top: 2px solid #eee;
            margin: 25px 0;
        }
        .footer {
            font-size: 13px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📁 قاعدة بيانات دفتر الديون</h1>
        <p>
            هذا الموقع هو <strong>مخزن بيانات فقط</strong> لتطبيق <strong>دفتر الديون</strong>.
        </p>
        <p>
            البيانات مخزنة في ملف <br>
            <span class="code">data.json</span>
        </p>
        <p>
            <span class="badge">✅ يعمل</span>
            <span style="margin:0 8px;">|</span>
            <span>📊 جاهز للاستخدام</span>
        </p>
        <hr>
        <p style="font-size: 14px; color: #666;">
            استخدم التطبيق المحلي (على جهازك) لإدارة العملاء والديون.<br>
            هذا الموقع لا يحتوي على واجهة إدارة.
        </p>
        <p class="footer">
            <i class="fas fa-database"></i> تم إنشاؤه بواسطة دفتر الديون
        </p>
    </div>
</body>
</html>

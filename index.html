<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دفتر الديون - مع الحفظ التلقائي على GitHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f0f0f2;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 30px 20px;
        }
        .app {
            max-width: 820px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            padding: 30px 28px 35px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            border: 1px solid #e8e8ec;
        }
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .app-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1b1b1b;
        }
        .app-header h1 i {
            color: #3a3a3a;
            margin-left: 10px;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .totals {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 28px;
        }
        .total-card {
            background: #f8f8fa;
            border-radius: 18px;
            padding: 18px 24px;
            border: 1px solid #eaeaed;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .total-card .label {
            font-size: 16px;
            color: #3a3a3a;
            font-weight: 500;
        }
        .total-card .value {
            font-size: 28px;
            font-weight: 700;
            color: #1b1b1b;
            direction: ltr;
        }
        .total-card .currency {
            font-size: 15px;
            font-weight: 400;
            color: #8e8e93;
            margin-right: 6px;
        }

        .backup-row {
            display: flex;
            gap: 12px;
            margin: 6px 0 20px;
            flex-wrap: wrap;
        }
        .backup-row .btn-sm {
            padding: 10px 18px;
            border: 1.5px solid #d9d9df;
            border-radius: 14px;
            background: #fff;
            font-size: 14px;
            font-weight: 500;
            color: #1b1b1b;
            cursor: pointer;
            transition: 0.2s;
        }
        .backup-row .btn-sm i { margin-left: 8px; }
        .backup-row .btn-sm:hover { background: #f2f2f5; }
        #fileInput { display: none; }

        .connection-status {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            background: #e8f0e8;
            color: #2d6a2d;
            white-space: nowrap;
        }
        .connection-status.offline {
            background: #f0e8e8;
            color: #8a2d2d;
        }
        .sync-btn {
            background: #1b1b1b;
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }
        .sync-btn:hover { background: #000; }
        .sync-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .search-box {
            position: relative;
            margin-bottom: 18px;
        }
        .search-box input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border-radius: 30px;
            border: 1.5px solid #e5e5ea;
            background: #fafafc;
            font-size: 16px;
        }
        .search-box input:focus { border-color: #3a3a3a; outline: none; background: #fff; }
        .search-box i {
            position: absolute;
            right: 22px;
            top: 18px;
            color: #8e8e93;
            font-size: 16px;
        }

        .btn-primary {
            background: #1b1b1b;
            color: #fff;
            padding: 14px 20px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .btn-primary:hover { background: #000; }

        .customer-item {
            background: #ffffff;
            padding: 14px 18px;
            border-radius: 16px;
            margin-bottom: 10px;
            border: 1px solid #efeff1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .customer-item:hover { border-color: #b0b0b8; background: #fafafc; }
        .customer-item .info {
            flex: 1;
            cursor: pointer;
            min-width: 140px;
        }
        .customer-item .info h4 {
            font-size: 17px;
            font-weight: 600;
            color: #1b1b1b;
        }
        .customer-item .info p {
            font-size: 13px;
            color: #6e6e73;
        }
        .customer-item .balance {
            font-weight: 700;
            font-size: 15px;
            direction: ltr;
            margin: 0 6px;
            min-width: 80px;
            text-align: center;
        }
        .balance.positive { color: #1b1b1b; }
        .balance.negative { color: #6e6e73; }

        .customer-item .actions {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }
        .customer-item .actions .btn-sm {
            padding: 6px 14px;
            border: 1px solid #d9d9df;
            border-radius: 30px;
            background: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            color: #1b1b1b;
            white-space: nowrap;
        }
        .customer-item .actions .btn-sm:hover { background: #f0f0f2; border-color: #b0b0b8; }
        .customer-item .actions .btn-sm.green { background: #e8f0e8; border-color: #8aaa8a; }
        .customer-item .actions .btn-sm.green:hover { background: #d0e0d0; }
        .customer-item .actions .btn-sm.pay { background: #e8e8f0; border-color: #8a8aaa; }
        .customer-item .actions .btn-sm.pay:hover { background: #d0d0e0; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(3px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #ffffff;
            border-radius: 32px;
            padding: 32px 30px;
            width: 500px;
            max-width: 94%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.08);
            border: 1px solid #efeff1;
        }
        .modal h3 {
            font-size: 22px;
            font-weight: 700;
            color: #1b1b1b;
            margin-bottom: 6px;
        }
        .modal .sub-title {
            font-size: 16px;
            color: #6e6e73;
            margin-bottom: 18px;
        }
        .modal .close-btn {
            float: left;
            background: none;
            border: none;
            font-size: 26px;
            color: #8e8e93;
            cursor: pointer;
            padding: 0 6px;
        }
        .modal .close-btn:hover { color: #1b1b1b; }

        .modal .form-group { margin-bottom: 16px; }
        .modal .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1b1b1b;
            margin-bottom: 5px;
        }
        .modal .form-group input,
        .modal .form-group select,
        .modal .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e5e5ea;
            border-radius: 14px;
            font-size: 15px;
            background: #fafafc;
        }
        .modal .form-group input:focus,
        .modal .form-group select:focus { border-color: #3a3a3a; outline: none; background: #fff; }
        .modal .form-group input[disabled] {
            background: #f0f0f2;
            color: #1b1b1b;
            font-weight: 600;
        }

        .modal .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            background: #1b1b1b;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal .btn:hover { background: #000; }
        .modal .btn-outline {
            background: transparent;
            color: #1b1b1b;
            border: 1.5px solid #d9d9df;
        }
        .modal .btn-outline:hover { background: #f2f2f5; }

        .quick-add-row {
            display: flex;
            gap: 10px;
            margin: 12px 0 16px;
            flex-wrap: wrap;
        }
        .quick-add-row .btn {
            flex: 1;
            min-width: 70px;
            padding: 12px;
            background: #f8f8fa;
            color: #1b1b1b;
            border: 1.5px solid #d9d9df;
            font-weight: 600;
        }
        .quick-add-row .btn:hover { background: #eaeaed; }
        .quick-add-row .btn.custom {
            border-color: #3a3a3a;
            background: #f0f0f2;
        }
        .quick-add-row .btn.custom:hover { background: #e0e0e4; }

        .modal .debt-item {
            background: #f8f8fa;
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 8px;
            border: 1px solid #efeff1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .modal .debt-item .info p {
            font-size: 13px;
            color: #6e6e73;
            margin-top: 2px;
        }
        .modal .debt-item .amount {
            font-weight: 700;
            font-size: 17px;
            direction: ltr;
        }
        .modal .debt-item .amount.positive { color: #1b1b1b; }
        .modal .debt-item .amount.negative { color: #6e6e73; }
        .modal .debt-item .amount.paid-off { text-decoration: line-through; color: #8e8e93; }
        .modal .debt-item .actions {
            display: flex;
            gap: 6px;
        }
        .modal .debt-item .actions button {
            background: none;
            border: none;
            font-size: 17px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            color: #6e6e73;
            transition: 0.15s;
        }
        .modal .debt-item .actions button:hover { background: #f0f0f2; }
        .modal .debt-item .actions .pay-btn {
            color: #1b1b1b;
            font-weight: 700;
        }
        .modal .debt-item .actions .pay-btn:hover { color: #0a0a0a; background: #d4d4e0; }
        .modal .debt-item .actions .del-btn { color: #8e8e93; }
        .modal .debt-item .actions .del-btn:hover { color: #c0392b; }

        .badge { font-size: 12px; padding: 2px 12px; border-radius: 30px; background: #f0f0f2; color: #3a3a3a; font-weight: 600; }
        .badge.paid { background: #e9e9ed; }

        .empty { color: #8e8e93; text-align: center; padding: 20px 0; font-size: 15px; }

        .flex { display: flex; gap: 10px; flex-wrap: wrap; }
        .mt-10 { margin-top: 12px; }
        .mb-10 { margin-bottom: 12px; }
        .text-danger { color: #b33; }
        .text-muted { color: #8e8e93; }
        .fw-bold { font-weight: 700; }
        .pay-all-btn { background: #2d2d2d; color: #fff; border: none; padding: 10px; border-radius: 14px; font-weight: 700; cursor: pointer; width: 100%; }
        .pay-all-btn:hover { background: #1a1a1a; }
        @media (max-width: 600px) {
            .app { padding: 20px 15px; }
            .totals { grid-template-columns: 1fr; }
            .app-header h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
<div class="app">

    <div class="app-header">
        <h1><i class="fas fa-scale-balanced"></i> دفتر الأموال</h1>
        <div class="header-actions">
            <span class="connection-status" id="statusBadge">🟢 متصل</span>
            <button class="sync-btn" id="syncBtn" onclick="syncWithGitHub()"><i class="fas fa-sync"></i> مزامنة</button>
        </div>
    </div>

    <div class="totals">
        <div class="total-card">
            <span class="label"><i class="fas fa-arrow-left" style="margin-left:8px;"></i> مستحق لي</span>
            <span class="value" id="totalLi">0 <span class="currency">د.ع</span></span>
        </div>
        <div class="total-card">
            <span class="label"><i class="fas fa-arrow-right" style="margin-left:8px;"></i> مستحق عليّ</span>
            <span class="value" id="totalAle">0 <span class="currency">د.ع</span></span>
        </div>
    </div>

    <div class="backup-row">
        <div class="btn-sm" onclick="exportBackup()"><i class="fas fa-download"></i> نسخ احتياطي</div>
        <div class="btn-sm" onclick="document.getElementById('fileInput').click()"><i class="fas fa-upload"></i> استعادة</div>
        <input type="file" id="fileInput" accept=".json" onchange="importBackup(event)">
    </div>

    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchCustomer" placeholder="ابحث عن عميل..." oninput="renderCustomers()">
    </div>
    <button class="btn-primary" style="margin-bottom:16px;" onclick="showAddCustomer()">+ إضافة عميل جديد</button>
    <div id="customersList"></div>

    <!-- مودال إضافة دين -->
    <div id="addDebtModal" class="modal-overlay">
        <div class="modal">
            <button class="close-btn" onclick="closeModal('addDebtModal')">&times;</button>
            <h3>إضافة دين جديد</h3>
            <div class="sub-title" id="addDebtClientName">للعميل: ...</div>
            <form onsubmit="addDebtFromMain(event)">
                <div class="form-group">
                    <label>المبلغ (د.ع)</label>
                    <input type="number" id="addDebtAmount" placeholder="0" step="1" required>
                </div>
                <div class="form-group">
                    <label>نوع الدين</label>
                    <select id="addDebtType" required>
                        <option value="li">لي (أنا الدائن)</option>
                        <option value="ale">عليّ (أنا المدين)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>تاريخ الاستحقاق</label>
                    <input type="date" id="addDebtDueDate">
                </div>
                <div class="form-group">
                    <label>ملاحظات</label>
                    <textarea id="addDebtNote" rows="2" placeholder="اختياري..."></textarea>
                </div>
                <div class="quick-add-row">
                    <button type="button" class="btn" onclick="setQuickAmount(30000)">30,000</button>
                    <button type="button" class="btn" onclick="setQuickAmount(35000)">35,000</button>
                    <button type="button" class="btn custom" onclick="setQuickAmount(null)">✏️ مخصص</button>
                </div>
                <button type="submit" class="btn">تسجيل</button>
            </form>
        </div>
    </div>

    <!-- مودال التسديد السريع -->
    <div id="paymentModal" class="modal-overlay">
        <div class="modal">
            <button class="close-btn" onclick="closeModal('paymentModal')">&times;</button>
            <h3 id="paymentModalName">تسديد ديون العميل</h3>
            <div class="sub-title" id="paymentModalSub">اختر الدين لتسديده</div>
            <button class="pay-all-btn" onclick="payAllDebts()" id="payAllBtn">✅ تسديد الكل</button>
            <hr style="margin:12px 0;">
            <div id="paymentDebtsList"></div>
            <div style="margin-top:16px;">
                <button class="btn btn-outline" onclick="closeModal('paymentModal')">إغلاق</button>
            </div>
        </div>
    </div>

    <!-- مودال إدارة العميل -->
    <div id="clientModal" class="modal-overlay">
        <div class="modal">
            <button class="close-btn" onclick="closeModal('clientModal')">&times;</button>
            <h3 id="clientModalName">العميل</h3>
            <div class="sub-title" id="clientModalBalance">الرصيد: 0 د.ع</div>
            <hr style="margin:12px 0 16px; border:0; border-top:1px solid #efeff1;">
            <div style="font-weight:600; margin-bottom:10px;">جميع الديون</div>
            <div id="clientModalDebtsList"></div>
            <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
                <button class="btn btn-outline" style="flex:1; min-width:60px;" onclick="closeModal('clientModal')">إغلاق</button>
                <button class="btn" style="flex:1; min-width:60px;" onclick="quickAddFromModal(30000)">➕ 30,000</button>
                <button class="btn" style="flex:1; min-width:60px;" onclick="quickAddFromModal(35000)">➕ 35,000</button>
                <button class="btn btn-outline" style="flex:1; min-width:60px; border-color:#3a3a3a;" onclick="quickAddFromModal(null)">➕ مخصص</button>
            </div>
            <div style="margin-top:12px; border-top:1px solid #efeff1; padding-top:12px;">
                <button class="btn btn-outline" style="width:100%; color:#b33; border-color:#d0a0a0;" onclick="deleteCurrentCustomer()">
                    <i class="fas fa-trash-alt"></i> حذف العميل وجميع ديونه (نادر الاستخدام)
                </button>
            </div>
        </div>
    </div>

</div>

<script>
    // ================================================================
    // 🔐 إعدادات GitHub - تم تحديثها بالرمز الجديد
    // ================================================================
    const GITHUB_TOKEN = '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';
    const REPO_OWNER = 'raedalzubaidi21-source';
    const REPO_NAME = 'my-debt-data';
    const DATA_FILE = 'data.json';

    // ================================================================
    // المتغيرات العامة
    // ================================================================
    let data = { customers: [], debts: [] };
    let currentSha = '';
    let isOnline = false;
    let syncInProgress = false;

    // ================================================================
    // دوال GitHub API
    // ================================================================

    async function loadFromGitHub() {
        try {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}`;
            const response = await fetch(url, {
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });

            if (response.status === 404) {
                return { customers: [], debts: [] };
            }

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const result = await response.json();
            currentSha = result.sha;
            const content = atob(result.content);
            return JSON.parse(content);
        } catch (error) {
            console.warn('⚠️ فشل التحميل من GitHub:', error.message);
            return null;
        }
    }

    async function saveToGitHub(dataToSave) {
        if (syncInProgress) return false;
        syncInProgress = true;
        document.getElementById('syncBtn').disabled = true;

        try {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}`;
            let sha = currentSha;

            if (!sha) {
                const getResponse = await fetch(url, {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                if (getResponse.ok) {
                    const result = await getResponse.json();
                    sha = result.sha;
                    currentSha = sha;
                }
            }

            const content = btoa(unescape(encodeURIComponent(JSON.stringify(dataToSave, null, 2))));

            const payload = {
                message: `تحديث البيانات - ${new Date().toLocaleString('ar-EG')}`,
                content: content,
                sha: sha || undefined
            };

            const putResponse = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json',
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify(payload)
            });

            if (!putResponse.ok) {
                const errorData = await putResponse.json();
                throw new Error(errorData.message || `HTTP ${putResponse.status}`);
            }

            const result = await putResponse.json();
            currentSha = result.content.sha;
            isOnline = true;
            updateStatusBadge();
            console.log('✅ تم حفظ البيانات على GitHub بنجاح!');
            return true;

        } catch (error) {
            console.error('❌ فشل الحفظ على GitHub:', error.message);
            isOnline = false;
            updateStatusBadge();
            localStorage.setItem('github_backup', JSON.stringify(dataToSave));
            return false;
        } finally {
            syncInProgress = false;
            document.getElementById('syncBtn').disabled = false;
        }
    }

    async function syncWithGitHub() {
        const btn = document.getElementById('syncBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري...';

        try {
            const remoteData = await loadFromGitHub();
            if (remoteData) {
                data.customers = remoteData.customers || [];
                data.debts = remoteData.debts || [];
                saveLocal();
                updateUI();
                alert('✅ تم تحديث البيانات من GitHub بنجاح!');
            } else {
                const saved = await saveToGitHub(data);
                if (saved) {
                    alert('✅ تم رفع البيانات إلى GitHub بنجاح!');
                } else {
                    alert('⚠️ فشل الاتصال بـ GitHub. البيانات محفوظة محلياً.');
                }
            }
        } catch (error) {
            alert('❌ حدث خطأ أثناء المزامنة: ' + error.message);
        }

        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sync"></i> مزامنة';
    }

    // ================================================================
    // دوال التخزين المحلي
    // ================================================================

    function saveLocal() {
        localStorage.setItem('debt_customers', JSON.stringify(data.customers));
        localStorage.setItem('debts_list', JSON.stringify(data.debts));
    }

    function loadLocal() {
        const customers = JSON.parse(localStorage.getItem('debt_customers'));
        const debts = JSON.parse(localStorage.getItem('debts_list'));
        if (customers) data.customers = customers;
        if (debts) data.debts = debts;
    }

    async function saveData() {
        saveLocal();
        try {
            await saveToGitHub(data);
        } catch (e) {}
        updateUI();
    }

    // ================================================================
    // حالة الاتصال
    // ================================================================

    function updateStatusBadge() {
        const badge = document.getElementById('statusBadge');
        if (isOnline) {
            badge.innerHTML = '🟢 متصل';
            badge.className = 'connection-status';
        } else {
            badge.innerHTML = '🔴 غير متصل (حفظ محلي)';
            badge.className = 'connection-status offline';
        }
    }

    // ================================================================
    // دوال التطبيق الأساسية
    // ================================================================

    function getCustomerName(id) {
        const c = data.customers.find(c => c.id === id);
        return c ? c.name : 'غير معروف';
    }

    function formatCurrency(amount) {
        return Number(amount).toFixed(0) + ' د.ع';
    }

    function getTotal(type) {
        return data.debts.filter(d => d.type === type && !d.paid).reduce((sum, d) => sum + Number(d.amount), 0);
    }

    function getCustomerBalance(customerId) {
        const totalLi = data.debts.filter(d => d.customerId === customerId && d.type === 'li' && !d.paid).reduce((s, d) => s + Number(d.amount), 0);
        const totalAle = data.debts.filter(d => d.customerId === customerId && d.type === 'ale' && !d.paid).reduce((s, d) => s + Number(d.amount), 0);
        return totalLi - totalAle;
    }

    // ---------- المودالات ----------
    let currentModalClientId = null;
    let paymentClientId = null;

    function openModal(id) {
        document.getElementById(id).classList.add('open');
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('open');
        if (id === 'clientModal') currentModalClientId = null;
        if (id === 'paymentModal') paymentClientId = null;
    }

    document.querySelectorAll('.modal-overlay').forEach(el => {
        el.addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('open');
        });
    });

    // ---------- عرض العملاء ----------
    function renderCustomers() {
        const container = document.getElementById('customersList');
        const search = document.getElementById('searchCustomer').value.toLowerCase();
        let filtered = data.customers.filter(c => c.name.toLowerCase().includes(search));
        if (!filtered.length) {
            container.innerHTML = '<div class="empty">لا يوجد عملاء</div>';
            return;
        }
        container.innerHTML = filtered.map(c => {
            const balance = getCustomerBalance(c.id);
            const balClass = balance >= 0 ? 'positive' : 'negative';
            const balText = balance >= 0 ? `له عليك ${formatCurrency(balance)}` : `عليه لك ${formatCurrency(Math.abs(balance))}`;
            const hasPending = data.debts.some(d => d.customerId === c.id && !d.paid);
            return `<div class="customer-item">
                <div class="info" onclick="openClientModal('${c.id}')">
                    <h4>${c.name}</h4>
                    <p>${c.phone || ''}</p>
                </div>
                <span class="balance ${balClass}">${balText}</span>
                <div class="actions">
                    ${hasPending ? `<button class="btn-sm pay" onclick="openPaymentModal('${c.id}')"><i class="fas fa-hand-holding-usd"></i> تسديد</button>` : ''}
                    <button class="btn-sm green" onclick="openAddDebtFromMain('${c.id}')"><i class="fas fa-plus"></i> دين</button>
                </div>
            </div>`;
        }).join('');
    }

    // ---------- إضافة عميل ----------
    function showAddCustomer() {
        const name = prompt('أدخل اسم العميل الجديد:');
        if (name && name.trim()) {
            const phone = prompt('رقم الهاتف (اختياري):');
            data.customers.push({
                id: Date.now().toString(36) + Math.random().toString(36).substr(2, 4),
                name: name.trim(),
                phone: phone || ''
            });
            saveData();
        }
    }

    // ---------- حذف العميل ----------
    function deleteCurrentCustomer() {
        if (!currentModalClientId) return;
        const client = data.customers.find(c => c.id === currentModalClientId);
        if (!client) return;
        if (confirm(`⚠️ هل أنت متأكد تماماً من حذف العميل "${client.name}" وجميع ديونه (${data.debts.filter(d => d.customerId === currentModalClientId).length} دين)؟\nهذا الإجراء لا يمكن التراجع عنه.`)) {
            if (confirm('تأكيد نهائي: اكتب "نعم" لحذف العميل')) {
                const id = currentModalClientId;
                data.customers = data.customers.filter(c => c.id !== id);
                data.debts = data.debts.filter(d => d.customerId !== id);
                saveData();
                closeModal('clientModal');
                alert('✅ تم حذف العميل وجميع ديونه.');
            }
        }
    }

    // ---------- إضافة دين ----------
    let addDebtTargetId = null;

    function openAddDebtFromMain(clientId) {
        const client = data.customers.find(c => c.id === clientId);
        if (!client) return;
        addDebtTargetId = clientId;
        document.getElementById('addDebtClientName').textContent = 'للعميل: ' + client.name;
        document.getElementById('addDebtAmount').value = '';
        document.getElementById('addDebtType').value = 'li';
        document.getElementById('addDebtDueDate').value = '';
        document.getElementById('addDebtNote').value = '';
        openModal('addDebtModal');
        document.getElementById('addDebtAmount').focus();
    }

    function setQuickAmount(amount) {
        const input = document.getElementById('addDebtAmount');
        if (amount !== null) {
            input.value = amount;
        } else {
            input.value = '';
        }
        input.focus();
    }

    function addDebtFromMain(e) {
        e.preventDefault();
        if (!addDebtTargetId) return;
        const amount = parseFloat(document.getElementById('addDebtAmount').value);
        const type = document.getElementById('addDebtType').value;
        const dueDate = document.getElementById('addDebtDueDate').value;
        const note = document.getElementById('addDebtNote').value;

        if (!amount || amount <= 0) {
            alert('يرجى إدخال مبلغ صحيح.');
            return;
        }

        data.debts.push({
            id: Date.now().toString(36) + Math.random().toString(36).substr(2, 4),
            customerId: addDebtTargetId,
            type: type,
            amount: amount,
            dueDate: dueDate || new Date().toISOString().split('T')[0],
            note: note || '',
            paid: false,
            createdAt: new Date().toISOString()
        });

        saveData();
        closeModal('addDebtModal');
        alert('✅ تم تسجيل الدين بنجاح!');
        addDebtTargetId = null;
    }

    // ---------- مودال التسديد ----------
    function openPaymentModal(clientId) {
        const client = data.customers.find(c => c.id === clientId);
        if (!client) return;
        paymentClientId = clientId;
        document.getElementById('paymentModalName').textContent = `تسديد ديون: ${client.name}`;
        const pendingCount = data.debts.filter(d => d.customerId === clientId && !d.paid).length;
        document.getElementById('paymentModalSub').textContent = `لديه ${pendingCount} دين غير مسدد`;
        renderPaymentDebts(clientId);
        openModal('paymentModal');
    }

    function renderPaymentDebts(clientId) {
        const container = document.getElementById('paymentDebtsList');
        const debts = data.debts.filter(d => d.customerId === clientId && !d.paid).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        if (!debts.length) {
            container.innerHTML = '<div class="empty">🎉 لا توجد ديون غير مسددة لهذا العميل</div>';
            document.getElementById('payAllBtn').style.display = 'none';
            return;
        }
        document.getElementById('payAllBtn').style.display = 'block';
        container.innerHTML = debts.map(d => {
            const label = d.type === 'li' ? 'لي' : 'عليّ';
            const amountClass = d.type === 'li' ? 'positive' : 'negative';
            return `<div class="debt-item">
                <div class="info">
                    <strong>${label}</strong> <span class="badge">معلق</span>
                    <p>📅 ${d.dueDate} ${d.note ? '| ' + d.note : ''}</p>
                </div>
                <div class="actions">
                    <span class="amount ${amountClass}">${formatCurrency(d.amount)}</span>
                    <button class="pay-btn" onclick="paySingleDebt('${d.id}')" title="تسديد هذا الدين"><i class="fas fa-check-circle"></i> تسديد</button>
                </div>
            </div>`;
        }).join('');
    }

    function paySingleDebt(id) {
        if (confirm('تسجيل هذا الدين كـ "مدفوع"؟')) {
            const debt = data.debts.find(d => d.id === id);
            if (debt) {
                debt.paid = true;
                saveData();
                if (paymentClientId) {
                    renderPaymentDebts(paymentClientId);
                    renderCustomers();
                    if (currentModalClientId) {
                        renderModalDebts(currentModalClientId);
                        updateModalBalance();
                    }
                }
                alert('✅ تم تسجيل الدين كمدفوع.');
            }
        }
    }

    function payAllDebts() {
        if (!paymentClientId) return;
        const pending = data.debts.filter(d => d.customerId === paymentClientId && !d.paid);
        if (pending.length === 0) {
            alert('لا توجد ديون غير مسددة.');
            return;
        }
        if (confirm(`هل أنت متأكد من تسديد جميع الديون (${pending.length} دين) للعميل ${getCustomerName(paymentClientId)}؟`)) {
            pending.forEach(d => d.paid = true);
            saveData();
            renderPaymentDebts(paymentClientId);
            renderCustomers();
            if (currentModalClientId) {
                renderModalDebts(currentModalClientId);
                updateModalBalance();
            }
            alert('✅ تم تسديد جميع الديون بنجاح!');
        }
    }

    // ---------- مودال إدارة العميل ----------
    function openClientModal(clientId) {
        const client = data.customers.find(c => c.id === clientId);
        if (!client) return;
        currentModalClientId = clientId;
        document.getElementById('clientModalName').textContent = client.name;
        updateModalBalance();
        renderModalDebts(clientId);
        openModal('clientModal');
    }

    function updateModalBalance() {
        if (!currentModalClientId) return;
        const balance = getCustomerBalance(currentModalClientId);
        document.getElementById('clientModalBalance').textContent = 'الرصيد: ' + (balance >= 0 ? '' : '- ') + formatCurrency(Math.abs(balance));
        document.getElementById('clientModalBalance').style.color = balance >= 0 ? '#1b1b1b' : '#6e6e73';
    }

    function renderModalDebts(clientId) {
        const container = document.getElementById('clientModalDebtsList');
        const debts = data.debts.filter(d => d.customerId === clientId).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        if (!debts.length) {
            container.innerHTML = '<div class="empty">لا توجد ديون لهذا العميل</div>';
            return;
        }
        container.innerHTML = debts.map(d => {
            const isPaid = d.paid;
            const amountClass = isPaid ? 'paid-off' : (d.type === 'li' ? 'positive' : 'negative');
            const label = d.type === 'li' ? 'لي' : 'عليّ';
            return `<div class="debt-item">
                <div class="info">
                    <strong>${label}</strong> <span class="badge ${isPaid ? 'paid' : ''}">${isPaid ? 'مدفوع' : 'معلق'}</span>
                    <p>📅 ${d.dueDate} ${d.note ? '| ' + d.note : ''}</p>
                </div>
                <div class="actions">
                    <span class="amount ${amountClass}">${formatCurrency(d.amount)}</span>
                    ${!isPaid ? `<button class="pay-btn" onclick="markPaidFromModal('${d.id}')" title="تسديد"><i class="fas fa-check-circle"></i> تسديد</button>` : ''}
                    <button class="del-btn" onclick="deleteDebtFromModal('${d.id}')" title="حذف الدين"><i class="fas fa-trash-alt"></i></button>
                </div>
            </div>`;
        }).join('');
    }

    function markPaidFromModal(id) {
        const debt = data.debts.find(d => d.id === id);
        if (debt) {
            debt.paid = true;
            saveData();
            if (currentModalClientId) {
                renderModalDebts(currentModalClientId);
                updateModalBalance();
            }
            renderCustomers();
            if (paymentClientId) {
                renderPaymentDebts(paymentClientId);
            }
        }
    }

    function deleteDebtFromModal(id) {
        if (confirm('هل أنت متأكد من حذف هذا الدين؟')) {
            data.debts = data.debts.filter(d => d.id !== id);
            saveData();
            if (currentModalClientId) {
                renderModalDebts(currentModalClientId);
                updateModalBalance();
            }
            renderCustomers();
            if (paymentClientId) {
                renderPaymentDebts(paymentClientId);
            }
            alert('✅ تم حذف الدين.');
        }
    }

    function quickAddFromModal(amount) {
        if (!currentModalClientId) return;
        openAddDebtFromMain(currentModalClientId);
        if (amount !== null) {
            document.getElementById('addDebtAmount').value = amount;
        } else {
            document.getElementById('addDebtAmount').value = '';
        }
        document.getElementById('addDebtAmount').focus();
        closeModal('clientModal');
    }

    // ---------- تحديث الإحصائيات ----------
    function updateStats() {
        document.getElementById('totalLi').innerHTML = Number(getTotal('li')).toFixed(0) + ' <span class="currency">د.ع</span>';
        document.getElementById('totalAle').innerHTML = Number(getTotal('ale')).toFixed(0) + ' <span class="currency">د.ع</span>';
    }

    // ---------- النسخ الاحتياطي والاستعادة ----------
    function exportBackup() {
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const now = new Date();
        const dateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
        a.download = `debt_backup_${dateStr}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        alert('✅ تم تحميل ملف النسخ الاحتياطي.');
    }

    function importBackup(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (imported.customers && imported.debts) {
                    if (confirm('سيتم استبدال جميع البيانات الحالية. هل أنت متأكد؟')) {
                        data.customers = imported.customers;
                        data.debts = imported.debts;
                        saveData();
                        alert('✅ تم استعادة البيانات بنجاح!');
                    }
                } else {
                    alert('❌ هذا الملف غير صالح.');
                }
            } catch (error) {
                alert('❌ حدث خطأ في قراءة الملف.');
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    // ---------- تحديث شامل ----------
    function updateUI() {
        updateStats();
        renderCustomers();
        if (currentModalClientId) {
            const modal = document.getElementById('clientModal');
            if (modal.classList.contains('open')) {
                renderModalDebts(currentModalClientId);
                updateModalBalance();
            }
        }
        if (paymentClientId) {
            const modal = document.getElementById('paymentModal');
            if (modal.classList.contains('open')) {
                renderPaymentDebts(paymentClientId);
            }
        }
    }

    // ================================================================
    // 🚀 بدء التشغيل
    // ================================================================
    window.onload = async function() {
        // 1. نحاول تحميل البيانات من GitHub
        const remoteData = await loadFromGitHub();

        // 2. إذا وجدنا بيانات على GitHub (حتى لو كانت فارغة)، نأخذها
        if (remoteData && remoteData.customers && remoteData.debts) {
            data.customers = remoteData.customers;
            data.debts = remoteData.debts;
            isOnline = true;
        } else {
            // 3. إذا فشل التحميل، نبحث في localStorage
            loadLocal();
            isOnline = false;
        }

        // 4. إذا كانت قائمة العملاء فارغة، نضيف العملاء الافتراضيين
        if (data.customers.length === 0) {
            console.log('📝 لا يوجد عملاء، جاري إضافة العملاء الافتراضيين...');
            ALL_CUSTOMERS.forEach(name => {
                data.customers.push({
                    id: Date.now().toString(36) + Math.random().toString(36).substr(2, 4),
                    name: name,
                    phone: ''
                });
            });
            saveLocal();
            await saveToGitHub(data);
        } else {
            saveLocal();
        }

        // 5. تحديث الواجهة
        updateStatusBadge();
        updateUI();
        console.log('✅ تم تحميل الصفحة بنجاح! عدد العملاء:', data.customers.length);
    };
